<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>אפליקציית חרמנוביץ</title>
    <script>
      // Define global for libraries that expect it
      window.global = window;
      
      // Protect fetch from being overwritten by polyfills
      if (typeof window.fetch === 'function') {
        const nativeFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: () => nativeFetch,
            set: (v) => { 
              console.warn('A library tried to overwrite window.fetch. Ignoring.');
            }
          });
        } catch (e) {
          // If we can't redefine it, at least we tried
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
